version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financa}
      POSTGRES_USER: ${POSTGRES_USER:-financa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financa}
      API_TOKEN: ${API_TOKEN:?required}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - financa
      - openclaw          # visível para o OpenClaw por nome: http://financa-backend:8000
    ports:
      - "0.0.0.0:8000:8000"   # app mobile acessa via IP público da VPS

volumes:
  postgres_data:

networks:
  financa:
    driver: bridge
  openclaw:
    external: true
    name: openclaw-clgu_default   # rede existente do OpenClaw

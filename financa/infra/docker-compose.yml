version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financa}
      POSTGRES_USER: ${POSTGRES_USER:-financa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - financa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-financa}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financa}
      API_TOKEN: ${API_TOKEN:?required}
      ENVIRONMENT: ${ENVIRONMENT:-production}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - financa
      - openclaw          # visível para o OpenClaw por nome: http://infra-backend-1:8000
      - traefik           # Traefik faz proxy HTTPS → container:8000
    ports:
      - "127.0.0.1:8000:8000"   # somente localhost — debug; internet usa HTTPS via Traefik
    labels:
      - "traefik.enable=true"
      # Rota HTTPS: https://<DOMAIN>/api/** → backend (strip /api prefix)
      - "traefik.http.routers.financa-api.rule=Host(`${DOMAIN:?DOMAIN not set}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.financa-api.entrypoints=websecure"
      - "traefik.http.routers.financa-api.tls.certresolver=letsencrypt"
      - "traefik.http.middlewares.financa-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.financa-api.middlewares=financa-strip"
      - "traefik.http.services.financa-api.loadbalancer.server.port=8000"

volumes:
  postgres_data:

networks:
  financa:
    driver: bridge
  openclaw:
    external: true
    name: openclaw-clgu_default   # rede existente do OpenClaw
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-traefik-proxy}   # rede padrão do Hostinger Docker Manager
